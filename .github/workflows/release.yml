name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write  # needed to create a GitHub Release

jobs:
  build-aab:
    name: Build signed AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > app/upload-keystore.jks
          test -s app/upload-keystore.jks || { echo "::error::Decoded keystore is empty"; exit 1; }

      - name: Write keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::KEYSTORE_PASSWORD, KEY_ALIAS, and KEY_PASSWORD must all be set"
            exit 1
          fi
          cat > keystore.properties <<EOF
          storeFile=app/upload-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build signed bundle
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Decode Play service-account JSON
        if: env.PLAY_SERVICE_ACCOUNT_JSON != ''
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          # The secret holds the raw JSON (not base64) for easier rotation.
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > play-service-account.json
          test -s play-service-account.json || { echo "::error::Decoded play-service-account.json is empty"; exit 1; }
          # Sanity-check it parses as JSON.
          python3 -c "import json,sys; json.load(open('play-service-account.json'))" || { echo "::error::play-service-account.json is not valid JSON"; exit 1; }

      - name: Publish bundle to internal testing track
        if: env.PLAY_SERVICE_ACCOUNT_JSON != ''
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: ./gradlew publishReleaseBundle --no-daemon --stacktrace

      - name: Skip Play upload (no PLAY_SERVICE_ACCOUNT_JSON secret set)
        if: env.PLAY_SERVICE_ACCOUNT_JSON == ''
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "::warning::PLAY_SERVICE_ACCOUNT_JSON secret is not set — skipping Play Console upload. The signed bundle is still attached to the GitHub Release."

      - name: Rename bundle with tag
        id: rename
        run: |
          TAG="${GITHUB_REF_NAME}"
          SRC=app/build/outputs/bundle/release/app-release.aab
          DST="app/build/outputs/bundle/release/days-in-office-${TAG}.aab"
          mv "$SRC" "$DST"
          echo "aab_path=$DST" >> "$GITHUB_OUTPUT"
          echo "aab_name=$(basename "$DST")" >> "$GITHUB_OUTPUT"

      - name: Upload bundle as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.aab_name }}
          path: ${{ steps.rename.outputs.aab_path }}
          retention-days: 30

      - name: Create GitHub Release with bundle attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.rename.outputs.aab_path }}

      - name: Clean signing secrets from the runner
        if: always()
        run: |
          rm -f app/upload-keystore.jks keystore.properties play-service-account.json
